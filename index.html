<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Senin İçin ❤️</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, #ff758c, #ff7eb3, #fad0c4);
    color: white;
    overflow-x: hidden;
    min-height: 100vh;
}

/* MERKEZ KART */
.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

/* BAŞLIK */
h1 {
    text-align: center;
    font-size: 28px;
    margin-top: 25px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 25px #ff4d6d; }
}

/* KART MESAJ */
.card {
    margin-top: 20px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    font-size: 16px;
    line-height: 1.6;
}

/* GALERİ */
.gallery {
    margin-top: 25px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.gallery img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 18px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* MÜZİK KART */
.music {
    margin-top: 25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 15px;
}

.music iframe {
    width: 100%;
    height: 352px;
    border-radius: 12px;
}

/* KALPLER */
.heart {
    position: fixed;
    width: 14px;
    height: 14px;
    background: red;
    transform: rotate(45deg);
    animation: floatUp 1s ease-out forwards;
    pointer-events: none;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    background: red;
    border-radius: 50%;
}

.heart::before { top: -7px; }
.heart::after { left: -7px; }

@keyframes floatUp {
    to {
        transform: translateY(-120px) scale(1.4) rotate(45deg);
        opacity: 0;
    }
}

/* ARKA PLAN KALP */
.bg-heart {
    position: fixed;
    bottom: -20px;
    color: rgba(255,255,255,0.5);
    font-size: 18px;
    animation: rise 6s linear infinite;
    pointer-events: none;
}

@keyframes rise {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-800px); opacity: 0; }
}

/* MOBİL İYİLEŞTİRME */
@media (max-width: 500px) {
    h1 {
        font-size: 24px;
    }

    .gallery {
        grid-template-columns: 1fr;
    }

    .gallery img {
        height: 220px;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>ANNESİNİN TATLIŞI DA BALLİSİ ❤️</h1>

<div class="card">
Seninle geçen her an çok eğlenceli.<br>
<br><br>
<b>İyi ki varsın ❤️</b>
</div>

<div class="gallery">
    <img src="ekin1.jpg">
    <img src="ekin2.jpg">
    <img src="ekin3.jpg">
</div>

<div class="music">
    <div class="spotify-card">
        <iframe 
            src="https://open.spotify.com/embed/track/6jQHBTdXEUx7LDjrkEiCax"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
    </div>
</div>

</div>

<script>

// Tıklama kalbi
document.addEventListener("click", function(e) {
    const heart = document.createElement("div");
    heart.className = "heart";

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 1000);
});

// Arka plan kalpler
function createBgHeart() {
    const heart = document.createElement("div");
    heart.className = "bg-heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createBgHeart, 450);

</script>

</body>
</html>
